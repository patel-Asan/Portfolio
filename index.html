<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patel Asan | Full Stack Developer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        const API_URL = 'https://portfolio-kjkrp23fa-asans-projects-69ce1902.vercel.app';

        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile menu toggle
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Close mobile menu on link click
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // Mobile menu close button
        const mobileMenuClose = document.getElementById('mobileMenuClose');
        if (mobileMenuClose) {
            mobileMenuClose.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        }

        // Close mobile menu when clicking outside (on backdrop)
        document.addEventListener('click', (e) => {
            if (navLinks.classList.contains('active') && 
                !navLinks.contains(e.target) && 
                !hamburger.contains(e.target)) {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            }
        });

        // Close mobile menu on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && navLinks.classList.contains('active')) {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            }
        });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Intersection Observer for scroll animations
        const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.section-header, .about-content, .skill-category, .project-card, .timeline-item, .contact-card, .contact-form, .service-card, .tech-item, .stat-box, .education-item').forEach(el => {
            el.classList.add('hidden');
            observer.observe(el);
        });

        // Section header enhanced reveal
        const headerObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                    headerObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('.section-header').forEach(header => {
            header.style.opacity = '0';
            header.style.transform = 'translateY(30px)';
            header.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            headerObserver.observe(header);
        });

        // Advanced Typing Animation with Multiple Roles
        const typingText = document.getElementById('typingText');
        if (typingText) {
            const roles = [
                { text: 'Full Stack Developer', color: '#0ea5e9' },
                { text: 'MERN Stack Expert', color: '#22c55e' },
                { text: 'UI/UX Designer', color: '#a855f7' },
                { text: 'Problem Solver', color: '#f59e0b' },
                { text: 'React Specialist', color: '#61dafb' },
                { text: 'Node.js Developer', color: '#339933' }
            ];
            let roleIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let typingSpeed = 100;
            
            function typeEffect() {
                const currentRole = roles[roleIndex];
                
                if (isDeleting) {
                    typingText.textContent = currentRole.text.substring(0, charIndex - 1);
                    charIndex--;
                    typingSpeed = 50;
                } else {
                    typingText.textContent = currentRole.text.substring(0, charIndex + 1);
                    charIndex++;
                    typingSpeed = 100;
                }
                
                // Dynamic color based on role
                typingText.style.color = currentRole.color;
                typingText.style.textShadow = `0 0 20px ${currentRole.color}40`;
                
                if (!isDeleting && charIndex === currentRole.text.length) {
                    isDeleting = true;
                    typingSpeed = 2000; // Pause at end
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    roleIndex = (roleIndex + 1) % roles.length;
                    typingSpeed = 500; // Pause before typing
                }
                
                setTimeout(typeEffect, typingSpeed);
            }
            
            typeEffect();
        }

        // Preloader Animation
        (function() {
            const preloader = document.getElementById('preloader');
            const progress = preloader.querySelector('.preloader-progress');
            let width = 0;
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        preloader.style.opacity = '0';
                        preloader.style.transition = 'opacity 0.5s ease';
                        setTimeout(() => {
                            preloader.style.display = 'none';
                            document.body.classList.add('loaded');
                        }, 500);
                    }, 300);
                } else {
                    width += Math.random() * 15 + 5;
                    if (width > 100) width = 100;
                    progress.style.width = width + '%';
                }
            }, 100);
        })();

        // Cursor Follower Effect
        (function() {
            const cursor = document.getElementById('customCursor');
            const follower = document.getElementById('cursorFollower');
            
            if (window.matchMedia('(pointer: coarse)').matches) {
                cursor.style.display = 'none';
                follower.style.display = 'none';
                return;
            }
            
            let mouseX = 0, mouseY = 0;
            let followerX = 0, followerY = 0;
            
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                cursor.style.left = mouseX - 10 + 'px';
                cursor.style.top = mouseY - 10 + 'px';
            });
            
            function animateFollower() {
                followerX += (mouseX - followerX) * 0.1;
                followerY += (mouseY - followerY) * 0.1;
                follower.style.left = followerX - 20 + 'px';
                follower.style.top = followerY - 20 + 'px';
                requestAnimationFrame(animateFollower);
            }
            animateFollower();
            
            // Hover effects
            const hoverElements = document.querySelectorAll('a, button, .tech-item, .service-card, .project-card');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.classList.add('cursor-hover');
                    follower.classList.add('follower-hover');
                });
                el.addEventListener('mouseleave', () => {
                    cursor.classList.remove('cursor-hover');
                    follower.classList.remove('follower-hover');
                });
            });
        })();

        // Toast Notification System
        window.showToast = function(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span>${message}</span>
                <button class="toast-close" aria-label="Close notification"><i class="fas fa-times"></i></button>
            `;
            
            // Close button click handler
            toast.querySelector('.toast-close').addEventListener('click', () => {
                toast.classList.remove('toast-show');
                setTimeout(() => toast.remove(), 300);
            });
            
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('toast-show'), 10);
            
            // Remove after duration
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.remove('toast-show');
                    setTimeout(() => toast.remove(), 300);
                }
            }, duration);
        };

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        const html = document.documentElement;

        // Load saved theme
        let savedTheme = 'light';
        try {
            savedTheme = localStorage.getItem('theme') || 'light';
        } catch (e) {}
        html.setAttribute('data-theme', savedTheme);
        themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            try {
                localStorage.setItem('theme', next);
            } catch (e) {}
            themeIcon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        });

        // Footer Particle Network Effect
        (function() {
            const canvas = document.getElementById('footerParticles');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId;
            let mouse = { x: null, y: null, radius: 120 };

            function resize() {
                const footer = canvas.parentElement;
                canvas.width = footer.offsetWidth;
                canvas.height = footer.offsetHeight;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = (Math.random() - 0.5) * 0.8 - 0.15;
                    this.radius = Math.random() * 2.5 + 0.8;
                    this.baseRadius = this.radius;
                    this.color = Math.random() > 0.6 ? '#0ea5e9' : '#38bdf8';
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                    // Mouse interaction
                    if (mouse.x !== null) {
                        const dx = mouse.x - this.x;
                        const dy = mouse.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < mouse.radius) {
                            const force = (mouse.radius - dist) / mouse.radius;
                            const dirX = dx / dist;
                            const dirY = dy / dist;
                            this.vx -= dirX * force * 0.6;
                            this.vy -= dirY * force * 0.6;
                            this.radius = Math.min(this.baseRadius * 2.5, this.baseRadius + force * 3);
                        } else {
                            this.radius += (this.baseRadius - this.radius) * 0.1;
                        }
                    } else {
                        this.radius += (this.baseRadius - this.radius) * 0.1;
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function createParticles() {
                particles = [];
                const count = Math.min(80, Math.floor((canvas.width * canvas.height) / 5000));
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle());
                }
            }

            function connect() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 140) {
                            const opacity = 0.25 * (1 - dist / 140);
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(14, 165, 233, ' + opacity + ')';
                            ctx.lineWidth = 0.6;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                connect();
                animationId = requestAnimationFrame(animate);
            }

            resize();
            createParticles();
            animate();

            window.addEventListener('resize', () => {
                resize();
                createParticles();
            });

            canvas.parentElement.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });

            canvas.parentElement.addEventListener('mouseleave', () => {
                mouse.x = null;
                mouse.y = null;
            });

            // Pause when footer not visible
            const footerObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        if (!animationId) animate();
                    } else {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                });
            }, { threshold: 0 });
            footerObserver.observe(canvas.parentElement);
        })();

        // Scroll Progress Bar
        window.addEventListener('scroll', () => {
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const progress = (scrollTop / scrollHeight) * 100;
            document.getElementById('scrollProgress').style.width = progress + '%';
        });

        // Timeline reveal animation
        const timelineItems = document.querySelectorAll('.timeline-item');
        const timelineObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.classList.add('show');
                    }, index * 200);
                }
            });
        }, { threshold: 0.2 });
        timelineItems.forEach(item => timelineObserver.observe(item));

        // Hero parallax on scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const hero = document.querySelector('.hero');
            if (hero && scrolled < window.innerHeight) {
                hero.style.backgroundPositionY = (scrolled * 0.3) + 'px';
            }
        });

        // Custom Cursor Effect
        const cursor = document.getElementById('customCursor');
        if (window.matchMedia('(pointer: fine)').matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            document.addEventListener('mousedown', () => cursor.classList.add('click'));
            document.addEventListener('mouseup', () => cursor.classList.remove('click'));

            const hoverElements = document.querySelectorAll('a, button, .skill-category, .project-card, .contact-card');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            });
        } else {
            cursor.style.display = 'none';
        }

        // Magnetic Button Effect
        const magneticBtns = document.querySelectorAll('.btn-primary, .btn-secondary, .project-link, .btn-submit');
        magneticBtns.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = '';
            });
        });

        // Navbar hide/show on scroll direction (disabled on mobile for hamburger access)
        let lastScroll = 0;
        let ticking = false;
        const isMobile = window.matchMedia('(max-width: 768px)').matches;
        
        window.addEventListener('scroll', () => {
            if (!ticking && !isMobile) {
                window.requestAnimationFrame(() => {
                    const currentScroll = window.pageYOffset;
                    
                    // Show/hide based on scroll direction (desktop only)
                    if (currentScroll > lastScroll && currentScroll > 100) {
                        navbar.classList.add('hidden');
                        navbar.classList.remove('visible');
                    } else {
                        navbar.classList.remove('hidden');
                        navbar.classList.add('visible');
                    }
                    
                    lastScroll = currentScroll;
                    ticking = false;
                });
                ticking = true;
            }
        });

        // Active nav link based on scroll position - use querySelectorAll for nav links
        const sections = document.querySelectorAll('section[id]');
        const navLinkElements = document.querySelectorAll('.nav-link');
        
        function updateActiveNav() {
            const scrollY = window.pageYOffset;
            
            sections.forEach(section => {
                const sectionHeight = section.offsetHeight;
                const sectionTop = section.offsetTop - 100;
                const sectionId = section.getAttribute('id');
                
                if (scrollY > sectionTop && scrollY <= sectionTop + sectionHeight) {
                    navLinkElements.forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === `#${sectionId}`) {
                            link.classList.add('active');
                        }
                    });
                }
            });
        }
        
        window.addEventListener('scroll', updateActiveNav);

        // Search Modal Functionality
        const searchModal = document.getElementById('searchModal');
        const searchInput = document.getElementById('searchInput');
        const searchClose = document.getElementById('searchClose');
        const searchResults = document.querySelectorAll('.search-result-item');
        const keyboardHint = document.getElementById('keyboardHint');
        
        function openSearch() {
            searchModal.classList.add('active');
            searchInput.focus();
        }
        
        function closeSearch() {
            searchModal.classList.remove('active');
            searchInput.value = '';
        }
        
        // Keyboard shortcut: Ctrl+K or Cmd+K
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                openSearch();
            }
            if (e.key === 'Escape') {
                closeSearch();
            }
        });
        
        searchClose.addEventListener('click', closeSearch);
        searchModal.addEventListener('click', (e) => {
            if (e.target === searchModal) closeSearch();
        });
        
        // Search result click
        searchResults.forEach(item => {
            item.addEventListener('click', () => {
                const sectionId = item.getAttribute('data-section');
                const section = document.getElementById(sectionId);
                if (section) {
                    section.scrollIntoView({ behavior: 'smooth' });
                    closeSearch();
                }
            });
        });
        
        // Filter search results
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            searchResults.forEach(item => {
                const text = item.querySelector('span').textContent.toLowerCase();
                if (text.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        // Project Filtering with smooth animation
        const filterButtons = document.querySelectorAll('.filter-btn');
        const projectCards = document.querySelectorAll('.project-card[data-category]');
        
        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                // Remove active class from all buttons
                filterButtons.forEach(btn => btn.classList.remove('active'));
                // Add active class to clicked button
                button.classList.add('active');
                
                const filter = button.getAttribute('data-filter');
                
                projectCards.forEach((card, index) => {
                    const categories = card.getAttribute('data-category');
                    
                    if (filter === 'all' || categories.includes(filter)) {
                        card.style.display = 'block';
                        // Staggered animation
                        card.style.animation = 'none';
                        card.offsetHeight; // Trigger reflow
                        card.style.animation = `fadeInUp 0.5s ease forwards`;
                        card.style.animationDelay = `${index * 0.1}s`;
                    } else {
                        card.style.display = 'none';
                    }
                });
                
                // Count visible projects
                const visibleCount = Array.from(projectCards).filter(card => {
                    const categories = card.getAttribute('data-category');
                    return filter === 'all' || categories.includes(filter);
                }).length;
                
                showToast(`${visibleCount} ${filter === 'all' ? '' : filter + ' '}projects found`, 'info', 2000);
            });
        });

        // Stats Counter Animation
        const statNumbers = document.querySelectorAll('.stat-number');
        const statsObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const target = entry.target;
                    const count = parseInt(target.getAttribute('data-count'));
                    let current = 0;
                    const increment = count / 30;
                    const timer = setInterval(() => {
                        current += increment;
                        if (current >= count) {
                            target.textContent = count;
                            clearInterval(timer);
                        } else {
                            target.textContent = Math.floor(current);
                        }
                    }, 50);
                    statsObserver.unobserve(target);
                }
            });
        }, { threshold: 0.5 });
        statNumbers.forEach(stat => statsObserver.observe(stat));

        // Back to Top Button
        const backToTop = document.getElementById('backToTop');
        
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 500) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });
        
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Hide keyboard hint on mobile
        if (window.matchMedia('(pointer: coarse)').matches) {
            keyboardHint.style.display = 'none';
        }

        // ===== PRO CONTACT FORM FEATURES =====
        const contactForm = document.getElementById('contactForm');
        const formName = document.getElementById('formName');
        const formEmail = document.getElementById('formEmail');
        const formSubject = document.getElementById('formSubject');
        const formMessage = document.getElementById('formMessage');
        const charCount = document.getElementById('charCount');
        const autosaveStatus = document.getElementById('autosaveStatus');
        
        // Email validation pattern
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        // Real-time validation
        function validateField(field, pattern = null) {
            const group = field.closest('.floating-group');
            const value = field.value.trim();
            
            if (value === '') {
                group.classList.remove('valid', 'invalid');
                return false;
            }
            
            const isValid = pattern ? pattern.test(value) : value.length >= 2;
            
            if (isValid) {
                group.classList.add('valid');
                group.classList.remove('invalid');
            } else {
                group.classList.add('invalid');
                group.classList.remove('valid');
            }
            
            return isValid;
        }
        
        // Character counter for message
        formMessage.addEventListener('input', () => {
            const count = formMessage.value.length;
            charCount.textContent = count;
            
            const counter = document.querySelector('.char-counter');
            counter.classList.remove('warning', 'danger');
            
            if (count > 400) {
                counter.classList.add('danger');
            } else if (count > 300) {
                counter.classList.add('warning');
            }
            
            autoSaveDraft();
        });
        
        // Real-time validation on input
        formName.addEventListener('input', () => validateField(formName));
        formEmail.addEventListener('input', () => validateField(formEmail, emailPattern));
        formSubject.addEventListener('input', () => validateField(formSubject));
        
        // Auto-save draft to localStorage
        function autoSaveDraft() {
            const draft = {
                name: formName.value,
                email: formEmail.value,
                subject: formSubject.value,
                message: formMessage.value,
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('contactFormDraft', JSON.stringify(draft));
            
            // Show auto-save indicator
            autosaveStatus.classList.add('show');
            setTimeout(() => {
                autosaveStatus.classList.remove('show');
            }, 2000);
        }
        
        // Load saved draft
        function loadDraft() {
            const saved = localStorage.getItem('contactFormDraft');
            if (saved) {
                const draft = JSON.parse(saved);
                formName.value = draft.name || '';
                formEmail.value = draft.email || '';
                formSubject.value = draft.subject || '';
                formMessage.value = draft.message || '';
                
                // Update character counter
                charCount.textContent = formMessage.value.length;
                
                // Trigger validation
                if (formName.value) validateField(formName);
                if (formEmail.value) validateField(formEmail, emailPattern);
                if (formSubject.value) validateField(formSubject);
            }
        }
        
        // Load draft on page load
        loadDraft();
        
        // Clear draft after successful submission
        function clearDraft() {
            localStorage.removeItem('contactFormDraft');
        }
        
        // Confetti animation for success
        function triggerConfetti() {
            const colors = ['#0ea5e9', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6'];
            const confettiCount = 100;
            
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: fixed;
                    top: -10px;
                    left: ${Math.random() * 100}vw;
                    width: ${Math.random() * 10 + 5}px;
                    height: ${Math.random() * 10 + 5}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                    pointer-events: none;
                    z-index: 99999;
                    animation: confetti-fall ${Math.random() * 3 + 2}s linear forwards;
                `;
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }
        
        // Add confetti animation keyframes
        const confettiStyle = document.createElement('style');
        confettiStyle.textContent = `
            @keyframes confetti-fall {
                0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
                100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
            }
        `;
        document.head.appendChild(confettiStyle);

        // Contact form submission with email validation
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitButton = document.getElementById('submitButton');
            const formStatus = document.getElementById('formStatus');
            
            const email = e.target.email.value.trim();
            
            // Email validation regex pattern
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            // Check if email is valid
            if (!emailPattern.test(email)) {
                formStatus.className = 'form-status error';
                formStatus.textContent = 'Please enter a valid email address (e.g., name@example.com)';
                showToast('Invalid email address!', 'error', 3000);
                e.target.email.focus();
                return; // Stop submission
            }
            
            submitButton.disabled = true;
            submitButton.innerHTML = 'Sending... <i class="fas fa-spinner fa-spin"></i>';

            const formData = {
                name: e.target.name.value.trim(),
                email: email,
                subject: e.target.subject.value.trim(),
                message: e.target.message.value.trim()
            };

            try {
                const response = await fetch(`${API_URL}/api/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    formStatus.className = 'form-status success';
                    formStatus.textContent = 'Message sent successfully!';
                    
                    // Trigger confetti celebration
                    triggerConfetti();
                    
                    // Show success toast
                    showToast('🎉 Message sent successfully!', 'success', 5000);
                    
                    // Clear saved draft
                    clearDraft();
                    
                    // Reset form
                    e.target.reset();
                    
                    // Clear validation states
                    document.querySelectorAll('.floating-group').forEach(group => {
                        group.classList.remove('valid', 'invalid');
                    });
                    
                    // Reset character counter
                    charCount.textContent = '0';
                } else {
                    formStatus.className = 'form-status error';
                    formStatus.textContent = data.message || 'Error sending message.';
                }
            } catch (error) {
                formStatus.className = 'form-status error';
                formStatus.textContent = 'Network error. Please try again.';
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = 'Send Message <i class="fas fa-paper-plane"></i>';
            }
        });

        // Welcome Toast Notification
        setTimeout(() => {
            showToast('👋 Welcome to my portfolio! Feel free to explore.', 'info', 5000);
        }, 2500);

        // Section Reveal Animations with Intersection Observer
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // Observe all major sections and cards
        document.querySelectorAll('section, .project-card, .tech-item, .education-item, .experience-item, .service-card').forEach(el => {
            el.classList.add('reveal-on-scroll');
            revealObserver.observe(el);
        });

        // Keyboard shortcuts info
        document.addEventListener('keydown', (e) => {
            // Press '?' to show keyboard shortcuts
            if (e.key === '?' && !e.ctrlKey && !e.altKey && !e.metaKey) {
                e.preventDefault();
                showToast('Keyboard Shortcuts: Ctrl+K (Search), ESC (Close)', 'info', 4000);
            }
        });
    </script>
</body>
</html>
